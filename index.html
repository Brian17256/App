<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HabitFlow AMOLED</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="amoled-theme">
    <div id="app">
        <header>
            <h1>Habit<span>Flow</span></h1>
            <div class="header-actions">
                <button id="settings-btn" class="icon-btn" aria-label="Configuración">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
            </div>
        </header>

        <main id="habit-list-container">
            <div id="habit-list" class="habit-list">
                <!-- Habits will be injected here -->
            </div>
        </main>

        <button id="add-habit-btn" class="fab" aria-label="Agregar hábito">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <!-- Modals -->
        <div id="modal-overlay" class="overlay hidden">
            <!-- Modal: Add/Edit Habit -->
            <div id="habit-modal" class="modal hidden">
                <h2 id="modal-title">Nuevo Hábito</h2>
                <div class="input-group">
                    <label for="habit-name">Nombre del hábito</label>
                    <input type="text" id="habit-name" placeholder="Ej. Ejercicio">
                </div>
                <div id="manual-edit-group" class="input-group hidden">
                    <label for="habit-days">Días actuales (Manual)</label>
                    <input type="number" id="habit-days" value="0" min="0">
                </div>
                <div class="modal-actions">
                    <button id="cancel-modal" class="btn btn-secondary">Cancelar</button>
                    <button id="reset-habit" class="btn btn-danger hidden">Resetear</button>
                    <button id="save-habit" class="btn btn-primary">Guardar</button>
                </div>
            </div>

            <!-- Modal: Settings -->
            <div id="settings-modal" class="modal hidden">
                <h2>Configuración</h2>
                <div class="settings-content">
                    <div class="setting-item">
                        <label>Simular tiempo (Días extra)</label>
                        <div class="counter-input">
                            <button id="sim-minus">-</button>
                            <span id="sim-days-display">0</span>
                            <button id="sim-plus">+</button>
                        </div>
                        <p class="hint">Esto permite probar cómo avanzan los contadores.</p>
                    </div>
                    <div class="setting-item">
                        <button id="export-data" class="btn btn-secondary">Exportar Datos</button>
                        <button id="reset-all" class="btn btn-danger">Resetear Todo</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="close-settings" class="btn btn-primary">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
